name: Build and Release APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        if: env.ENCODED_STRING != ''
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_STORE_FILE_BASE64 }}
          STORE_PASS: ${{ secrets.RELEASE_STORE_PASSWORD }}
        run: |
          CLEAN=$(echo "$ENCODED_STRING" | sed '/^-----/d' | tr -d '\n\r\t ')
          echo "$CLEAN" | base64 -d > /tmp/release.jks
          echo "Keystore decoded: $(wc -c < /tmp/release.jks) bytes"
          keytool -list -keystore /tmp/release.jks -storepass "$STORE_PASS" -storetype PKCS12 2>&1 | head -3 || echo "keytool validation failed"

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          RELEASE_STORE_FILE: /tmp/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThingSpeak-Monitor-Release
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
